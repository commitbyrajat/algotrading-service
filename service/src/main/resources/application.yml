server:
  port: 8080

spring:
  application:
    name: algotrading-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # password: ${SPRING_DATA_REDIS_PASSWORD:}   # uncomment if Redis auth is enabled
      timeout: 2000ms
      connect-timeout: 2000ms

kite:
  # Obtained from Zerodha Developer Console after creating a Kite Connect app
  api-key: ${KITE_API_KEY:your-api-key-here}
  # api_secret is used once per session to exchange request_token → access_token
  api-secret: ${KITE_API_SECRET:your-api-secret-here}
  # user-id is your Zerodha client ID (e.g. AB1234)
  user-id: ${KITE_USER_ID:your-user-id-here}
  # Must exactly match the Redirect URL set in the Kite Connect Developer Console
  redirect-url: ${KITE_REDIRECT_URL:http://127.0.0.1:8080/kite/callback}

instrument:
  require-expiry-for-lookup: ${INSTRUMENT_REQUIRE_EXPIRY_FOR_LOOKUP:false}

trading:
  market-hours:
    close-time: ${TRADING_MARKET_CLOSE_TIME:15:30}
  position-sizing:
    capital: ${TRADING_POSITION_SIZING_CAPITAL:500000}
    risk-percent: ${TRADING_POSITION_SIZING_RISK_PERCENT:0.01}
    atr-period: ${TRADING_POSITION_SIZING_ATR_PERIOD:14}
    atr-multiplier: ${TRADING_POSITION_SIZING_ATR_MULTIPLIER:1.5}
    max-portfolio-exposure-percent: ${TRADING_POSITION_SIZING_MAX_PORTFOLIO_EXPOSURE_PERCENT:0.20}

logging:
  level:
    root: INFO
    com.algotrading.app: DEBUG
