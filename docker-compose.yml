services:
  redis:
    image: redis:7-alpine
    container_name: algotrading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-build:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: algotrading-app-build
    working_dir: /workspace
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - ~/.m2/repository:/root/.m2/repository
#      - ~/.m2/settings.xml:/root/.m2/settings.xml:ro
    command: mvn clean install

  app:
    image: eclipse-temurin:21-jre-alpine
    container_name: algotrading-app
    working_dir: /workspace
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      app-build:
        condition: service_completed_successfully
    volumes:
      - ./service:/workspace/service
    environment:
      KITE_API_KEY: ${KITE_API_KEY}
      KITE_API_SECRET: ${KITE_API_SECRET}
      KITE_USER_ID: ${KITE_USER_ID}
      KITE_REDIRECT_URL: ${KITE_REDIRECT_URL:-http://127.0.0.1:8080/api/v1/kite/callback}
      INSTRUMENT_REQUIRE_EXPIRY_FOR_LOOKUP: ${INSTRUMENT_REQUIRE_EXPIRY_FOR_LOOKUP:-false}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    command: sh -c "java -jar service/target/service-*.jar"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  openapi-mcp:
    image: evilfreelancer/openapi-to-mcp:latest
    container_name: algotrading-openapi-mcp
    ports:
      - "3100:3100"
    depends_on:
      app:
        condition: service_healthy
    environment:
      MCP_SERVER_NAME: algotrading-service-mcp
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3100
      MCP_OPENAPI_SPEC_URL: http://app:8080/v3/api-docs
      MCP_API_BASE_URL: http://app:8080
      MCP_TOOL_PREFIX: algotrading_
    restart: unless-stopped

  agent-build:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: algotrading-agent-build
    working_dir: /workspace/agent
    volumes:
      - ./agent:/workspace/agent
      - uv_cache:/root/.cache/uv
    command: uv sync --locked

  agent:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: algotrading-agent
    working_dir: /workspace/agent
    ports:
      - "8090:8090"
    depends_on:
      openapi-mcp:
        condition: service_started
      agent-build:
        condition: service_completed_successfully
    volumes:
      - ./agent:/workspace/agent
      - uv_cache:/root/.cache/uv
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AGENT_MODEL: ${AGENT_MODEL:-openai-chat:gpt-4o-mini}
      MCP_ENDPOINT_URL: http://openapi-mcp:3100/mcp
      AGENT_CRON_MINUTES: ${AGENT_CRON_MINUTES:-*/5}
      AGENT_TIMEZONE: ${AGENT_TIMEZONE:-Asia/Kolkata}
      AGENT_ENABLE_ORDER_TOOLS: ${AGENT_ENABLE_ORDER_TOOLS:-false}
      AGENT_ALLOW_TRADING: ${AGENT_ALLOW_TRADING:-false}
      AGENT_INSTRUMENT_EXCHANGE: ${AGENT_INSTRUMENT_EXCHANGE:-NSE}
      AGENT_STRATEGY_NAMES: ${AGENT_STRATEGY_NAMES:-GAINZ_ALPHA_V2}
      AGENT_HTTP_HOST: 0.0.0.0
      AGENT_HTTP_PORT: 8090
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
      AGENT_CANDLE_LOOKBACK_DAYS: ${AGENT_CANDLE_LOOKBACK_DAYS:-120}
      AGENT_INTRADAY_LOOKBACK_DAYS: ${AGENT_INTRADAY_LOOKBACK_DAYS:-1}
      AGENT_CANDLE_INTERVAL: ${AGENT_CANDLE_INTERVAL:-}
      AGENT_ORDER_QUANTITY: ${AGENT_ORDER_QUANTITY:-1}
      AGENT_ORDER_PRODUCT: ${AGENT_ORDER_PRODUCT:-CNC}
      AGENT_ORDER_TYPE: ${AGENT_ORDER_TYPE:-MARKET}
      AGENT_MAX_ORDERS_PER_CYCLE: ${AGENT_MAX_ORDERS_PER_CYCLE:-2}
      AGENT_TODAY: ${AGENT_TODAY:-}
    command: uv run --locked python main.py
    restart: unless-stopped

volumes:
  redis_data:
  uv_cache:
