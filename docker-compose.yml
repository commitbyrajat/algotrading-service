services:
  redis:
    image: redis:7-alpine
    container_name: algotrading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: algotrading-app
    working_dir: /workspace
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - ~/.m2/repository:/root/.m2/repository
#      - ~/.m2/settings.xml:/root/.m2/settings.xml:ro
    environment:
      KITE_API_KEY: ${KITE_API_KEY}
      KITE_API_SECRET: ${KITE_API_SECRET}
      KITE_USER_ID: ${KITE_USER_ID}
      KITE_REDIRECT_URL: ${KITE_REDIRECT_URL:-http://127.0.0.1:8080/api/v1/kite/callback}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    command: >
      sh -c "mvn clean install &&
             mvn spring-boot:run"
    restart: unless-stopped

  openapi-mcp:
    image: evilfreelancer/openapi-to-mcp:latest
    container_name: algotrading-openapi-mcp
    ports:
      - "3100:3100"
    depends_on:
      - app
    environment:
      MCP_SERVER_NAME: algotrading-service-mcp
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3100
      MCP_OPENAPI_SPEC_URL: http://app:8080/v3/api-docs
      MCP_API_BASE_URL: http://app:8080
      MCP_TOOL_PREFIX: algotrading_
    restart: unless-stopped

volumes:
  redis_data:
